name: Mobile Build

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Install dependencies
        run: npm ci
      - name: Build shared package
        run: npm run build -w packages/shared
      - name: Build web + Capacitor sync
        run: npm run build:android
        working-directory: apps/web
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      - name: Build APK
        run: ./gradlew assembleRelease
        working-directory: apps/web/android
      - name: Sign APK (debug)
        run: |
          cp app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/app-release.apk
          jarsigner -sigalg SHA256withRSA -digestalg SHA256 \
            -keystore ~/.android/debug.keystore -storepass android -keypass android \
            app/build/outputs/apk/release/app-release.apk androiddebugkey
          $ANDROID_HOME/build-tools/36.0.0/zipalign -v 4 \
            app/build/outputs/apk/release/app-release.apk \
            po-tiramisu-android.apk
        working-directory: apps/web/android
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: po-tiramisu-android
          path: apps/web/android/po-tiramisu-android.apk
