name: iOS Build

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build shared package
        run: npm run build -w packages/shared
      - name: Build web + Capacitor sync
        run: npm run build:ios
        working-directory: apps/web
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      - name: Build iOS app
        run: |
          cd ios/App
          xcodebuild -project App.xcodeproj -scheme App -configuration Release -sdk iphoneos -archivePath build/App.xcarchive archive
          xcodebuild -project App.xcodeproj -scheme App -configuration Release -sdk iphoneos -exportArchive -archivePath build/App.xcarchive -exportOptionsPlist ../../exportOptions.plist -exportPath build/ipa
        working-directory: apps/web
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: po-tiramisu-ios
          path: apps/web/ios/App/build/ipa/*.ipa
