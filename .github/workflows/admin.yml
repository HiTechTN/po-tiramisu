name: Admin CI

on:
  push:
    branches: ["master", "main"]
    paths:
      - "apps/admin/**"
      - "packages/shared/**"
  pull_request:
    branches: ["master", "main"]
    paths:
      - "apps/admin/**"
      - "packages/shared/**"

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm audit --omit=dev || true
      - run: npm run build -w packages/shared
      - run: npx tsc --noEmit -p apps/admin/tsconfig.json
