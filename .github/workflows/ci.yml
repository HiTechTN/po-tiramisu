name: CI/CD — Build, Test & Release

on:
  push:
    branches: [master, main]
    tags: ["v*"]
  pull_request:
    branches: [master, main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/po-tiramisu

permissions:
  contents: write
  packages: write

jobs:
  # ──────────────────────────────────────────────
  # 1. Lint & Test
  # ──────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python (backend)
        if: matrix.service == 'backend'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install & test backend
        if: matrix.service == 'backend'
        run: |
          cd backend
          pip install -r requirements.txt
          python -m pytest tests/ -v --tb=short

      - name: Set up Node.js (frontend)
        if: matrix.service == 'frontend'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install & lint frontend
        if: matrix.service == 'frontend'
        run: |
          cd frontend
          npm ci
          npm run lint
          npm run build

  # ──────────────────────────────────────────────
  # 2. Build Docker Images
  # ──────────────────────────────────────────────
  docker-build:
    if: github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: backend
            context: ./backend
            image-suffix: backend
          - service: frontend
            context: ./frontend
            image-suffix: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.image-suffix }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}

  # ──────────────────────────────────────────────
  # 3. Build Mobile APK
  # ──────────────────────────────────────────────
  mobile-build:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Expo CLI
        run: npm install -g eas-cli expo-cli

      - name: Install mobile dependencies
        run: cd mobile && npm ci

      - name: Build Android APK
        run: |
          cd mobile
          npx expo prebuild --platform android
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: po-tiramisu-android-${{ github.ref_name }}
          path: mobile/android/app/build/outputs/apk/release/*.apk
          retention-days: 30

  # ──────────────────────────────────────────────
  # 4. Build Web Static Export
  # ──────────────────────────────────────────────
  web-export:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build static export
        run: |
          cd frontend
          npm ci
          # Temporarily override next.config for static export
          cat > next.config.ts << 'EOF'
          const nextConfig = {
            output: 'export',
            images: { unoptimized: true },
          };
          export default nextConfig;
          EOF
          NEXT_PUBLIC_API_URL=https://api.po-tiramisu.tn npm run build

      - name: Zip web export
        run: cd frontend && zip -r ../po-tiramisu-web-${{ github.ref_name }}.zip out/

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: po-tiramisu-web-${{ github.ref_name }}
          path: po-tiramisu-web-${{ github.ref_name }}.zip
          retention-days: 30

  # ──────────────────────────────────────────────
  # 5. GitHub Release
  # ──────────────────────────────────────────────
  release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [docker-build, mobile-build, web-export]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Package backend distribution
        run: |
          cd backend
          pip install build
          python -m build
          cd ..

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "Po Tiramisu ${{ github.ref_name }}"
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            po-tiramisu-android-${{ github.ref_name }}/*.apk
            po-tiramisu-web-${{ github.ref_name }}/*.zip
            backend/dist/*
          body: |
            ## 🍰 Po Tiramisu ${{ github.ref_name }}

            ### Artifacts
            - **Android APK** — `po-tiramisu-android-${{ github.ref_name }}.apk`
            - **Web Export** — `po-tiramisu-web-${{ github.ref_name }}.zip`
            - **Backend Python Wheel** — `backend/dist/*.whl`

            ### Docker Images
            ```bash
            docker pull ghcr.io/${{ github.repository_owner }}/po-tiramisu-backend:${{ github.ref_name }}
            docker pull ghcr.io/${{ github.repository_owner }}/po-tiramisu-frontend:${{ github.ref_name }}
            ```

            ### Quick Start (Docker)
            ```bash
            git clone https://github.com/${{ github.repository }}.git
            cd po-tiramisu
            make prod
            ```
